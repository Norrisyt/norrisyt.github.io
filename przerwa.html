<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Przerwa techniczna - Adiminos</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;500;600&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #ddd;
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
        }

        .container {
            max-width: 600px;
            padding: 60px 40px;
            background: #111;
            border-radius: 20px;
            border: 1px solid #333;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
        }

        .icon {
            font-size: 7rem;
            margin-bottom: 30px;
            animation: spin 20s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        h1 {
            color: #ff5252;
            font-size: 3.2rem;
            margin-bottom: 20px;
            font-family: 'Playfair Display', serif;
        }

        p {
            font-size: 1.35rem;
            color: #aaa;
            line-height: 1.8;
            margin-bottom: 50px;
        }

        /* Panel Admin */
        .admin-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #1f1f1f;
            color: #ddd;
            padding: 12px 20px;
            border-radius: 50px;
            cursor: pointer;
            z-index: 200;
            font-size: 1rem;
            border: 1px solid #444;
            transition: 0.3s;
        }

        .admin-btn:hover {
            background: #ff5252;
            color: white;
        }

        .admin-panel {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #111;
            padding: 40px 45px;
            border-radius: 16px;
            border: 1px solid #444;
            z-index: 300;
            width: 90%;
            max-width: 440px;
            text-align: center;
            box-shadow: 0 15px 50px rgba(0,0,0,0.7);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon">🔧</div>
        <h1>Przerwa techniczna</h1>
        <p>
            Strona jest tymczasowo niedostępna.<br><br>
            Pracuję nad aktualizacją i poprawkami.<br>
            Wrócę najszybciej jak się da!
        </p>
    </div>

    <!-- Przycisk Admin -->
    <div class="admin-btn" onclick="showAdminPanel()">🔧 Admin</div>

    <!-- Panel Administratora -->
    <div id="adminPanel" class="admin-panel">
        <h2 style="color:#ff5252; margin-bottom:25px;">Panel Administratora</h2>
        
        <input type="password" id="adminPassword" placeholder="Wpisz hasło" 
               style="width:100%; padding:14px; margin-bottom:20px; border-radius:8px; border:1px solid #555; background:#1a1a1a; color:white; font-size:1.1rem;">
        
        <button onclick="checkPassword()" 
                style="padding:14px 28px; background:#ff5252; color:white; border:none; border-radius:8px; cursor:pointer; width:100%; font-size:1.05rem;">
            Zaloguj się
        </button>

        <div id="adminControls" style="display:none; margin-top:25px;">
            <button onclick="toggleMaintenance(false)" 
                    style="background:#ff5252; color:white; padding:14px; margin:10px 0; width:100%; border:none; border-radius:8px; font-size:1.1rem;">
                Wyłącz przerwę techniczną
            </button>
        </div>

        <button onclick="hideAdminPanel()" style="margin-top:25px; color:#888; background:none; border:none; cursor:pointer;">
            Zamknij
        </button>
    </div>

    <script>
        const ADMIN_PASSWORD = "Shire123%";

        function showAdminPanel() {
            document.getElementById("adminPanel").style.display = "block";
        }

        function hideAdminPanel() {
            document.getElementById("adminPanel").style.display = "none";
            document.getElementById("adminPassword").value = "";
        }

        function checkPassword() {
            const input = document.getElementById("adminPassword").value.trim();
            if (input === ADMIN_PASSWORD) {
                document.getElementById("adminControls").style.display = "block";
            } else {
                alert("❌ Niepoprawne hasło!");
            }
        }

        function toggleMaintenance() {
            localStorage.removeItem("maintenanceMode");
            alert("✅ Przerwa techniczna została WYŁĄCZONA");
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
