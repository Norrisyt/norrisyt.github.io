<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Przerwa techniczna - Adiminos</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #ddd;
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .container {
            max-width: 520px;
            padding: 60px 40px;
            background: #111;
            border-radius: 16px;
            border: 1px solid #333;
        }

        .icon {
            font-size: 5rem;
            margin-bottom: 30px;
        }

        h1 {
            color: #ff5252;
            font-size: 2.8rem;
            margin-bottom: 20px;
        }

        p {
            font-size: 1.3rem;
            color: #aaa;
            line-height: 1.7;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🔧</div>
        <h1>Przerwa techniczna</h1>
        <p>
            Strona jest tymczasowo niedostępna.<br><br>
            Pracuję nad aktualizacją i poprawkami.<br>
            Wrócę najszybciej jak się da!
        </p>
    </div>
</body>
</html>
