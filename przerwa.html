<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Przerwa techniczna - Adiminos</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;500;600&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #ddd;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .container {
            max-width: 560px;
            padding: 60px 40px;
            background: #111;
            border-radius: 20px;
            border: 1px solid #333;
        }
        .icon { font-size: 7rem; margin-bottom: 30px; }
        h1 { color: #ff5252; font-size: 3.2rem; margin-bottom: 20px; font-family: 'Playfair Display', serif; }
        p { font-size: 1.35rem; color: #aaa; line-height: 1.8; }

        .admin-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #222;
            color: #ddd;
            padding: 12px 20px;
            border-radius: 50px;
            cursor: pointer;
            z-index: 200;
        }
        .admin-panel {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #111;
            padding: 40px;
            border-radius: 16px;
            border: 1px solid #444;
            z-index: 300;
            max-width: 400px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon">🔧</div>
        <h1>Przerwa techniczna</h1>
        <p>
            Strona jest tymczasowo niedostępna.<br><br>
            Pracuję nad aktualizacją i poprawkami.<br>
            Wrócę najszybciej jak się da!
        </p>
    </div>

    <div class="admin-btn" onclick="showAdminPanel()">🔧 Admin</div>

    <div id="adminPanel" class="admin-panel">
        <h2 style="color:#ff5252; margin-bottom:25px;">Panel Administratora</h2>
        <input type="password" id="adminPassword" placeholder="Wpisz hasło" style="width:100%; padding:12px; margin-bottom:15px; border-radius:8px; background:#1a1a1a; color:white;">
        <button onclick="checkPassword()" style="width:100%; padding:14px; background:#ff5252; color:white; border:none; border-radius:8px;">Zaloguj się</button>
        
        <div id="adminControls" style="display:none; margin-top:20px;">
            <button onclick="disableMaintenance()" style="width:100%; padding:14px; background:#ff5252; color:white; border:none; border-radius:8px; margin-bottom:10px;">
                Wyłącz przerwę techniczną
            </button>
        </div>
        <button onclick="hideAdminPanel()" style="margin-top:15px; color:#888;">Zamknij</button>
    </div>

    <script>
        const ADMIN_PASSWORD = "Shire123%";

        function showAdminPanel() {
            document.getElementById("adminPanel").style.display = "block";
        }

        function hideAdminPanel() {
            document.getElementById("adminPanel").style.display = "none";
            document.getElementById("adminPassword").value = "";
        }

        function checkPassword() {
            if (document.getElementById("adminPassword").value === ADMIN_PASSWORD) {
                document.getElementById("adminControls").style.display = "block";
            } else {
                alert("Niepoprawne hasło!");
            }
        }

        function disableMaintenance() {
            localStorage.removeItem("maintenanceMode");
            alert("Przerwa techniczna została wyłączona");
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
