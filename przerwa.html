<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Przerwa techniczna - Adiminos</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #ddd;
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .container {
            max-width: 520px;
            padding: 60px 40px;
            background: #111;
            border-radius: 16px;
            border: 1px solid #333;
        }

        .icon {
            font-size: 5.5rem;
            margin-bottom: 30px;
        }

        h1 {
            color: #ff5252;
            font-size: 2.9rem;
            margin-bottom: 20px;
        }

        p {
            font-size: 1.3rem;
            color: #aaa;
            line-height: 1.7;
            margin-bottom: 40px;
        }

        /* Panel Administratora */
        .admin-btn {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: #222;
            color: #ddd;
            padding: 10px 18px;
            border-radius: 8px;
            font-size: 0.95rem;
            cursor: pointer;
            z-index: 200;
            border: 1px solid #444;
        }

        .admin-panel {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #111;
            padding: 35px 40px;
            border-radius: 12px;
            border: 1px solid #444;
            z-index: 300;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon">🔧</div>
        <h1>Przerwa techniczna</h1>
        <p>
            Strona jest tymczasowo niedostępna.<br><br>
            Pracuję nad aktualizacją i poprawkami.<br>
            Wrócę najszybciej jak się da!
        </p>
    </div>

    <!-- Przycisk Admin -->
    <div class="admin-btn" onclick="showAdminPanel()">🔧 Admin</div>

    <!-- Panel Administratora -->
    <div id="adminPanel" class="admin-panel">
        <h2 style="color:#ff5252; margin-bottom:25px;">Panel Administratora</h2>
        
        <input type="password" id="adminPassword" placeholder="Wpisz hasło" 
               style="width:100%; padding:12px; margin-bottom:15px; border-radius:8px; border:1px solid #555; background:#1a1a1a; color:white;">
        
        <button onclick="checkPassword()" 
                style="padding:12px 24px; background:#ff5252; color:white; border:none; border-radius:8px; cursor:pointer; width:100%; margin-bottom:10px;">
            Zaloguj się
        </button>

        <div id="adminControls" style="display:none; margin-top:15px;">
            <button onclick="toggleMaintenance(false)" 
                    style="background:#ff5252; color:white; padding:14px; margin:8px 0; width:100%; border:none; border-radius:8px; font-size:1.05rem;">
                Wyłącz przerwę techniczną
            </button>
        </div>

        <button onclick="hideAdminPanel()" style="margin-top:20px; color:#888; background:none; border:none; cursor:pointer;">
            Zamknij
        </button>
    </div>

    <script>
        const ADMIN_PASSWORD = "Shire123%";

        function showAdminPanel() {
            document.getElementById("adminPanel").style.display = "block";
        }

        function hideAdminPanel() {
            document.getElementById("adminPanel").style.display = "none";
            document.getElementById("adminPassword").value = "";
        }

        function checkPassword() {
            const input = document.getElementById("adminPassword").value.trim();
            if (input === ADMIN_PASSWORD) {
                document.getElementById("adminControls").style.display = "block";
            } else {
                alert("❌ Niepoprawne hasło!");
            }
        }

        function toggleMaintenance(enable) {
            if (!enable) {
                localStorage.removeItem("maintenanceMode");
                alert("Przerwa techniczna została WYŁĄCZONA");
                // Przekieruj z powrotem na stronę główną
                window.location.href = "index.html";
            }
        }
    </script>
</body>
</html>
