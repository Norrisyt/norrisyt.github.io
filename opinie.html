<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opinie - Adiminos</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;500;600&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #ddd;
            line-height: 1.6;
        }
        .nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(10,10,10,0.97);
            backdrop-filter: blur(12px);
            z-index: 100;
            padding: 18px 0;
            border-bottom: 1px solid #222;
        }
        .nav ul {
            display: flex;
            justify-content: center;
            gap: 50px;
            list-style: none;
        }
        .nav a {
            color: #ddd;
            text-decoration: none;
            font-weight: 500;
            font-size: 1.05rem;
        }
        .nav a:hover { color: #ff5252; }

        .container {
            max-width: 700px;
            margin: 120px auto 60px;
            padding: 50px 40px;
            background: #111;
            border-radius: 16px;
            border: 1px solid #333;
        }
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.2rem;
            text-align: center;
            margin-bottom: 30px;
            color: white;
        }
        textarea {
            width: 100%;
            height: 200px;
            padding: 16px;
            background: #1a1a1a;
            border: 1px solid #444;
            color: white;
            border-radius: 8px;
            font-size: 1.1rem;
            margin-bottom: 25px;
        }
        button {
            width: 100%;
            padding: 16px;
            background: #ff5252;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            cursor: pointer;
        }
        button:hover {
            background: #ff1744;
        }
        .success { color: #4ade80; margin-top: 20px; display: none; text-align: center; }
        .error { color: #ff5252; margin-top: 20px; display: none; text-align: center; }
    </style>
</head>
<body>

    <nav class="nav">
        <ul>
            <li><a href="index.html">Strona główna</a></li>
            <li><a href="o-mnie.html">O mnie</a></li>
            <li><a href="galeria.html">Galeria</a></li>
            <li><a href="osp.html">OSP</a></li>
            <li><a href="opinie.html">Opinie</a></li>
            <li><a href="kontakt.html">Kontakt</a></li>
        </ul>
    </nav>

    <div class="container">
        <h1>Napisz opinię</h1>
        <p style="text-align:center; color:#aaa; margin-bottom:40px;">
            Twoja opinia zostanie zapisana bezpośrednio jako Issue na GitHubie
        </p>

        <form id="opinionForm">
            <textarea id="opinionText" placeholder="Co Ci się podobało? Co można poprawić? Jakie masz uwagi? Napisz szczerze..." required></textarea>
            <button type="submit">Wyślij opinię</button>
        </form>

        <p id="successMessage" class="success">✅ Opinia została wysłana pomyślnie!</p>
        <p id="errorMessage" class="error">❌ Coś poszło nie tak. Spróbuj ponownie.</p>
    </div>

    <script>
        const TOKEN = "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";
        const REPO = "Norrisyt/norrisyt.github.io";

        document.getElementById("opinionForm").addEventListener("submit", async function(e) {
            e.preventDefault();

            const text = document.getElementById("opinionText").value.trim();
            if (!text) return alert("Napisz coś przed wysłaniem!");

            const button = this.querySelector("button");
            button.disabled = true;
            button.textContent = "Wysyłam...";

            try {
                const response = await fetch(`https://api.github.com/repos/${REPO}/issues`, {
                    method: "POST",
                    headers: {
                        "Authorization": `token ${TOKEN}`,
                        "Accept": "application/vnd.github.v3+json",
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        title: "Opinia ze strony",
                        body: text,
                        labels: ["opinia"]
                    })
                });

                if (response.ok) {
                    document.getElementById("successMessage").style.display = "block";
                    document.getElementById("opinionText").value = "";
                    setTimeout(() => {
                        document.getElementById("successMessage").style.display = "none";
                    }, 6000);
                } else {
                    document.getElementById("errorMessage").style.display = "block";
                }
            } catch (error) {
                document.getElementById("errorMessage").style.display = "block";
            }

            button.disabled = false;
            button.textContent = "Wyślij opinię";
        });
    </script>
</body>
</html>
