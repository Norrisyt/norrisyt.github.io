<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opinie - Adiminos</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #ddd; padding: 40px; }
        .form { max-width: 600px; margin: 0 auto; background: #111; padding: 40px; border-radius: 12px; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #1a1a1a; border: 1px solid #444; color: white; border-radius: 8px; }
        button { background: #ff5252; color: white; padding: 14px 30px; border: none; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

<div class="form">
    <h2>Napisz opinię</h2>
    <form action="https://api.github.com/repos/Norrisyt/norrisyt.github.io/issues" method="POST" target="_blank">
        <input type="text" name="title" placeholder="Tytuł opinii (np. Super strona!)" required>
        <textarea name="body" rows="6" placeholder="Twoja opinia..." required></textarea>
        
        <!-- Ukryte pole - ważne! -->
        <input type="hidden" name="labels" value="opinia">
        
        <button type="submit">Wyślij opinię na GitHub</button>
    </form>
    <p style="margin-top:20px; font-size:0.9rem; color:#888;">
        Opinia zostanie zapisana jako Issue w moim repozytorium GitHub.
    </p>
</div>

</body>
</html>
