    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;500;600&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #ddd;
        }
        .nav { /* ten sam styl jak wyżej */ 
            position: fixed; top: 0; width: 100%; background: rgba(10,10,10,0.97);
            backdrop-filter: blur(12px); z-index: 100; padding: 18px 0; border-bottom: 1px solid #222;
        }
        .nav ul { display: flex; justify-content: center; gap: 50px; list-style: none; }
        .nav a { color: #ddd; text-decoration: none; font-weight: 500; font-size: 1.05rem; }
        .nav a:hover { color: #ff5252; }

        .header {
            text-align: center;
            padding: 130px 20px 80px;
        }
        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.8rem;
            color: white;
        }

        .gallery {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(310px, 1fr));
            gap: 16px;
        }
        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.6);
        }
        .gallery-item img:hover {
            transform: scale(1.05);
        }
    </style>
</head>
