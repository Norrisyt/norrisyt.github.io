<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria - Adiminos</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;500;600&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #ddd;
            line-height: 1.6;
        }

        .nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(10, 10, 10, 0.97);
            backdrop-filter: blur(12px);
            z-index: 100;
            padding: 18px 0;
            border-bottom: 1px solid #222;
        }

        .nav ul {
            display: flex;
            justify-content: center;
            gap: 50px;
            list-style: none;
        }

        .nav a {
            color: #ddd;
            text-decoration: none;
            font-weight: 500;
            font-size: 1.1rem;
        }

        .nav a:hover {
            color: #ff5252;
        }

        .header {
            text-align: center;
            padding: 130px 20px 70px;
        }

        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.8rem;
            color: white;
            margin-bottom: 10px;
        }

        .gallery {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 15px;
        }

        .gallery-item {
            overflow: hidden;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.6);
            transition: all 0.4s ease;
        }

        .gallery-item:hover {
            transform: scale(1.06);
            box-shadow: 0 15px 35px rgba(255, 82, 82, 0.25);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
    </style>
</head>
<body>

    <!-- Nawigacja -->
    <nav class="nav">
        <ul>
            <li><a href="index.html">Strona główna</a></li>
            <li><a href="o-mnie.html">O mnie</a></li>
            <li><a href="galeria.html">Galeria</a></li>
            <li><a href="osp.html">OSP</a></li>
            <li><a href="kontakt.html">Kontakt</a></li>
        </ul>
    </nav>

    <div class="header">
        <h1>Moja Galeria</h1>
        <p style="color: #888; font-size: 1.2rem;">Fotografia uliczna • Komunikacja miejska • Życie miasta</p>
    </div>

    <!-- === GALERIA ZDJĘĆ === -->
    <div class="gallery">

        <!-- Tutaj dodawaj swoje zdjęcia -->
        <!-- Przykład jak dodać zdjęcie: -->

        <div class="gallery-item">
            <img src="zdjecia/tramwaj1.jpg" alt="Tramwaj">
        </div>

        <div class="gallery-item">
            <img src="zdjecia/autobus1.jpg" alt="Autobus">
        </div>

        <div class="gallery-item">
            <img src="zdjecia/ulica1.jpg" alt="Ulica">
        </div>

        <div class="gallery-item">
            <img src="zdjecia/tramwaj-noc.jpg" alt="Tramwaj nocą">
        </div>

        <!-- Dodaj więcej bloków poniżej w ten sam sposób -->

    </div>

</body>
</html>
