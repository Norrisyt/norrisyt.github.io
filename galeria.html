<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria - Adiminos</title>
    <style>
        @import url('https://github.com/Norrisyt/norrisyt.github.io/tree/main/Norrisyt');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0f0f0f;
            color: #ddd;
            line-height: 1.6;
        }

        .nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(15, 15, 15, 0.95);
            backdrop-filter: blur(12px);
            z-index: 100;
            padding: 16px 0;
            border-bottom: 1px solid #222;
        }

        .nav ul {
            display: flex;
            justify-content: center;
            gap: 50px;
            list-style: none;
        }

        .nav a {
            color: #ddd;
            text-decoration: none;
            font-weight: 500;
            font-size: 1.08rem;
            transition: color 0.3s;
        }

        .nav a:hover {
            color: #ff5252;
        }

        .header {
            text-align: center;
            padding: 120px 20px 60px;
        }

        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.8rem;
            margin-bottom: 12px;
            color: white;
        }

        .header p {
            font-size: 1.25rem;
            color: #aaa;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Galeria siatka */
        .gallery {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 12px;
        }

        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            aspect-ratio: 4 / 3;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            transition: all 0.4s ease;
        }

        .gallery-item:hover {
            transform: scale(1.04);
            box-shadow: 0 15px 40px rgba(255, 82, 82, 0.3);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.12);
        }

        .overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.85));
            padding: 25px 20px 20px;
            opacity: 0;
            transition: opacity 0.4s;
        }

        .gallery-item:hover .overlay {
            opacity: 1;
        }

        .overlay h3 {
            font-size: 1.1rem;
            margin-bottom: 4px;
        }

        .overlay p {
            font-size: 0.95rem;
            color: #ccc;
        }

        .footer {
            text-align: center;
            padding: 80px 20px 40px;
            color: #666;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>

    <!-- Nawigacja -->
    <nav class="nav">
        <ul>
            <li><a href="index.html">Strona główna</a></li>
            <li><a href="o-mnie.html">O mnie</a></li>
            <li><a href="galeria.html">Galeria</a></li>
            <li><a href="osp.html">OSP</a></li>
            <li><a href="kontakt.html">Kontakt</a></li>
        </ul>
    </nav>

    <div class="header">
        <h1>Moja Galeria</h1>
        <p>ulica • komunikacja miejska • życie miasta • strażackie momenty</p>
    </div>

    <!-- GALERIA -->
    <div class="gallery">
        
        <!-- Tutaj wstawiasz swoje zdjęcia -->
        <div class="gallery-item">
            <img src="zdjecia/tramwaj1.jpg" alt="Tramwaj w deszczu">
            <div class="overlay">
                <h3>Tramwaj nocą</h3>
                <p>ulica • deszcz</p>
            </div>
        </div>

        <div class="gallery-item">
            <img src="tranwajpiaski1.jpg" alt="Autobus na pętli">
            <div class="overlay">
                <h3>Autobus na pętli</h3>
                <p>złota godzina</p>
            </div>
        </div>

        <div class="gallery-item">
            <img src="zdjecia/ulica1.jpg" alt="Ulica miejska">
            <div class="overlay">
                <h3>Miasto w ruchu</h3>
                <p>fotografia uliczna</p>
            </div>
        </div>

        <!-- Dodaj kolejne zdjęcia w ten sam sposób -->

    </div>

    <div class="footer">
        <p>Adiminos © 2026 • Wszystkie zdjęcia zrobione telefonem</p>
    </div>

</body>
</html>
